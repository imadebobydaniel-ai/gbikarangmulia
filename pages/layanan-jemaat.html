<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permohonan Layanan Jemaat | GBI Karang Mulia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
    body { background: linear-gradient(135deg, #0b4ea2, #072c5a); font-family: 'Segoe UI', sans-serif; }
    .back-btn { position: fixed; top: 20px; left: 20px; background: white; border: none; border-radius: 50px; padding: 10px 20px; font-weight: 600; color: #0b4ea2; cursor: pointer; z-index: 1000; transition: 0.3s; }
    .back-btn:hover { background: #ff8c00; color: white; transform: translateX(-5px); }
    .container-custom { max-width: 800px; margin: 100px auto 50px; padding: 0 20px; }
    .form-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .page-title { text-align: center; color: white; margin-bottom: 30px; }
    .btn-submit { background: linear-gradient(135deg, #ff8c00, #e07a00); border: none; padding: 12px; border-radius: 50px; font-weight: 600; width: 100%; color: white; transition: 0.3s; }
    .btn-submit:hover { transform: translateY(-2px); }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    footer { text-align: center; color: white; padding: 30px; opacity: 0.8; }
    .alert-danger { background-color: #f8d7da; color: #721c24; border-color: #f5c6cb; }
</style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='../index.html'"><i class="fa-solid fa-arrow-left"></i> Kembali</button>

<div class="container-custom">
    <div class="page-title">
        <h1><i class="fa-solid fa-hand-holding-heart"></i> Permohonan Layanan Jemaat</h1>
        <p>Ajukan permohonan doa, kunjungan, pernikahan, baptisan, atau layanan lainnya</p>
    </div>
    <div class="form-card">
        <form id="layananForm">
            <div class="mb-3"><label class="form-label">Nama Lengkap *</label><input type="text" id="nama" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">No. Telepon / WhatsApp *</label><input type="tel" id="telp" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Jenis Layanan *</label><select id="jenisLayanan" class="form-select" required>
                <option value="">Pilih jenis layanan</option>
                <option>Permohonan Doa</option>
                <option>Kunjungan Pastoral</option>
                <option>Pernikahan</option>
                <option>Baptisan</option>
                <option>Konseling</option>
                <option>Pelayanan Kesehatan</option>
                <option>Lainnya</option>
            </select></div>
            <div class="mb-3"><label class="form-label">Deskripsi / Keterangan *</label><textarea id="deskripsi" class="form-control" rows="4" placeholder="Jelaskan permohonan Anda..." required></textarea></div>
            <button type="submit" class="btn-submit"><i class="fa-solid fa-paper-plane"></i> Kirim Permohonan</button>
        </form>
        <div id="successMessage" class="alert alert-success mt-3 d-none"></div>
        <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>
    </div>
</div>
<footer>GBI Karang Mulia - Melayani dengan Kasih Kristus</footer>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBnTg18qJ233oh-1Mgj4ewwRMUwMh8iVTo",
        authDomain: "gbi-karang-mulia-web.firebaseapp.com",
        projectId: "gbi-karang-mulia-web",
        storageBucket: "gbi-karang-mulia-web.firebasestorage.app",
        messagingSenderId: "198652175873",
        appId: "1:198652175873:web:82a8f9cb00557dcac88200"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    document.getElementById('layananForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.querySelector('#layananForm button[type="submit"]');
        const successMsg = document.getElementById('successMessage');
        const errorMsg = document.getElementById('errorMessage');
        
        // Reset dan disable tombol
        successMsg.classList.add('d-none');
        errorMsg.classList.add('d-none');
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mengirim...';
        
        try {
            const data = {
                nama: document.getElementById('nama').value,
                telp: document.getElementById('telp').value,
                jenisLayanan: document.getElementById('jenisLayanan').value,
                deskripsi: document.getElementById('deskripsi').value,
                status: "Baru",
                tanggal: new Date().toLocaleDateString('id-ID'),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };
            
            await db.collection('permohonan_layanan').add(data);
            
            // Reset form
            document.getElementById('layananForm').reset();
            
            // Tampilkan pesan sukses
            successMsg.innerHTML = '<i class="fa-solid fa-check-circle"></i> Permohonan Anda telah dikirim. Admin akan menghubungi Anda segera.';
            successMsg.classList.remove('d-none');
            
            // Redirect ke halaman utama setelah 3 detik
            setTimeout(() => {
                window.location.href = '../index.html';
            }, 3000);
            
        } catch (error) {
            console.error("Error:", error);
            
            // Tampilkan pesan error
            errorMsg.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Gagal mengirim permohonan. Silakan coba lagi.';
            errorMsg.classList.remove('d-none');
            
            // Kembalikan tombol ke keadaan semula
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Kirim Permohonan';
        }
    });
</script>
</body>
</html>
