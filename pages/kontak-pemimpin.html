<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontak Pemimpin & Koordinator | GBI Karang Mulia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
    body { background: linear-gradient(135deg, #0b4ea2, #072c5a); font-family: 'Segoe UI', sans-serif; }
    .back-btn { position: fixed; top: 20px; left: 20px; background: white; border: none; border-radius: 50px; padding: 10px 20px; font-weight: 600; color: #0b4ea2; cursor: pointer; z-index: 1000; transition: 0.3s; }
    .back-btn:hover { background: #ff8c00; color: white; transform: translateX(-5px); }
    .container-custom { max-width: 1200px; margin: 100px auto 50px; padding: 0 20px; }
    .page-title { text-align: center; color: white; margin-bottom: 40px; }
    .page-title h1 { font-size: 2rem; font-weight: 800; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    .kontak-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); transition: 0.3s; }
    .kontak-card:hover { transform: translateY(-5px); }
    .kontak-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #0b4ea2, #ff8c00); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 20px; }
    .kontak-icon i { font-size: 1.8rem; color: white; }
    .divisi-badge { background: #ff8c00; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; display: inline-block; margin-top: 8px; }
    .loading { text-align: center; padding: 50px; color: white; }
    footer { text-align: center; color: white; padding: 30px; opacity: 0.8; }
</style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='../index.html'"><i class="fa-solid fa-arrow-left"></i> Kembali</button>

<div class="container-custom">
    <div class="page-title">
        <h1><i class="fa-solid fa-address-card"></i> Kontak Para Pemimpin & Koordinator</h1>
        <p>Hubungi pengurus gereja untuk informasi lebih lanjut</p>
    </div>
    <div id="kontakList"></div>
</div>
<footer>GBI Karang Mulia - Memberkati & Melayani</footer>

<script>
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_SENDER_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    function escapeHtml(str) { if (!str) return '-'; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
    
    async function loadKontak() {
        const container = document.getElementById('kontakList');
        container.innerHTML = '<div class="loading"><div class="spinner-border text-light"></div><p>Memuat data...</p></div>';
        try {
            const snapshot = await db.collection('kontak_pemimpin').orderBy('order', 'asc').get();
            const data = [];
            snapshot.forEach(doc => data.push(doc.data()));
            if (data.length === 0) { container.innerHTML = '<div class="alert alert-info text-center">Belum ada data kontak</div>'; return; }
            container.innerHTML = data.map(k => `
                <div class="kontak-card">
                    <div class="d-flex flex-wrap align-items-center">
                        <div class="kontak-icon"><i class="fa-solid fa-user-pastor"></i></div>
                        <div class="flex-grow-1">
                            <h4 class="mb-1">${escapeHtml(k.nama)}</h4>
                            <p class="mb-1 text-muted"><strong>${escapeHtml(k.jabatan)}</strong></p>
                            <div class="divisi-badge"><i class="fa-solid fa-users"></i> ${escapeHtml(k.divisi)}</div>
                        </div>
                        <div class="mt-3 mt-md-0">
                            <a href="tel:${escapeHtml(k.telp)}" class="btn btn-outline-primary me-2"><i class="fa-solid fa-phone"></i> ${escapeHtml(k.telp)}</a>
                            <a href="mailto:${escapeHtml(k.email)}" class="btn btn-outline-secondary"><i class="fa-solid fa-envelope"></i> Email</a>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch(e) { container.innerHTML = '<div class="alert alert-danger">Gagal memuat data</div>'; }
    }
    document.addEventListener('DOMContentLoaded', loadKontak);
</script>
</body>
</html>
