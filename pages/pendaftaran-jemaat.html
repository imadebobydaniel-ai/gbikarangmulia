<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendaftaran Anggota Jemaat | GBI Karang Mulia</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
    body { background: linear-gradient(135deg, #0b4ea2, #072c5a); font-family: 'Segoe UI', sans-serif; }
    .back-btn { position: fixed; top: 20px; left: 20px; background: white; border: none; border-radius: 50px; padding: 10px 20px; font-weight: 600; color: #0b4ea2; cursor: pointer; z-index: 1000; transition: 0.3s; }
    .back-btn:hover { background: #ff8c00; color: white; transform: translateX(-5px); }
    .container-custom { max-width: 800px; margin: 100px auto 50px; padding: 0 20px; }
    .form-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .page-title { text-align: center; color: white; margin-bottom: 30px; }
    .btn-submit { background: linear-gradient(135deg, #ff8c00, #e07a00); border: none; padding: 12px; border-radius: 50px; font-weight: 600; width: 100%; color: white; transition: 0.3s; }
    .btn-submit:hover { transform: translateY(-2px); }
    footer { text-align: center; color: white; padding: 30px; opacity: 0.8; }
    .step-indicator { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; flex-wrap: wrap; }
    .step { text-align: center; color: #6c757d; }
    .step.active { color: #ff8c00; font-weight: bold; }
    .step.completed { color: #28a745; }
    .preview-img { width: 100px; height: 100px; object-fit: cover; border-radius: 50%; border: 3px solid #ff8c00; margin-top: 10px; }
    .upload-area { border: 2px dashed #dee2e6; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
    .upload-area:hover { border-color: #ff8c00; background: #fff8f0; }
    #fileInfo { font-size: 0.8rem; color: #6c757d; margin-top: 5px; }
    .error-text { color: #dc3545; font-size: 0.8rem; margin-top: 5px; }
</style>
</head>
<body>

<button class="back-btn" onclick="window.location.href='../index.html'"><i class="fa-solid fa-arrow-left"></i> Kembali</button>

<div class="container-custom">
    <div class="page-title">
        <h1><i class="fa-solid fa-user-plus"></i> Pendaftaran Anggota Jemaat</h1>
        <p>Bergabung menjadi keluarga besar GBI Karang Mulia</p>
    </div>
    <div class="form-card">
        <div class="step-indicator">
            <div class="step active">1. Data Diri</div>
            <div class="step">2. Data Rohani</div>
            <div class="step">3. Konfirmasi</div>
        </div>
        <form id="daftarForm">
            <!-- STEP 1: DATA DIRI -->
            <div id="step1">
                <div class="mb-3"><label class="form-label">Nama Lengkap *</label><input type="text" id="namaLengkap" class="form-control" required></div>
                
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">Tempat Lahir</label><input type="text" id="tempatLahir" class="form-control"></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Tanggal Lahir</label><input type="date" id="tanggalLahir" class="form-control"></div>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label">Jenis Kelamin</label><select id="jenisKelamin" class="form-select"><option>Laki-laki</option><option>Perempuan</option></select></div>
                    <div class="col-md-6 mb-3"><label class="form-label">Golongan Darah</label><select id="golonganDarah" class="form-select"><option value="">Pilih Golongan Darah</option><option>A</option><option>B</option><option>O</option><option>AB</option><option>AB+</option></select></div>
                </div>
                
                <div class="mb-3"><label class="form-label">Alamat Email *</label><input type="email" id="email" class="form-control" placeholder="contoh: nama@gmail.com" required></div>
                
                <!-- UPLOAD FOTO PROFIL (BASE64 - TANPA FIREBASE STORAGE) -->
                <div class="mb-3">
                    <label class="form-label">Foto Profil Terbaru *</label>
                    <div class="upload-area" onclick="document.getElementById('fileFoto').click()">
                        <i class="fa-solid fa-cloud-upload-alt fa-2x mb-2" style="color:#ff8c00"></i>
                        <p class="mb-0">Klik untuk upload foto</p>
                        <small id="fileInfo">Format JPG/PNG, max 2MB</small>
                    </div>
                    <input type="file" id="fileFoto" class="d-none" accept="image/jpeg,image/png" onchange="previewFoto(this)">
                    <div id="previewContainer" class="text-center mt-2"></div>
                    <input type="hidden" id="fotoBase64">
                    <div id="fotoError" class="error-text"></div>
                </div>

                <div class="mb-3"><label class="form-label">No. HP / WhatsApp *</label><input type="tel" id="noHp" class="form-control" placeholder="Contoh: 08123456789" required></div>
                <div class="mb-3"><label class="form-label">Alamat Lengkap</label><textarea id="alamat" class="form-control" rows="2"></textarea></div>
                <div class="mb-3"><label class="form-label">Pekerjaan</label><input type="text" id="pekerjaan" class="form-control"></div>
                
                <button type="button" class="btn-submit" onclick="nextStep(2)">Selanjutnya <i class="fa-solid fa-arrow-right"></i></button>
            </div>
            
            <!-- STEP 2: DATA ROHANI -->
            <div id="step2" style="display:none;">
                <div class="mb-3"><label class="form-label">Status Baptis</label><select id="baptis" class="form-select"><option>Belum Baptis</option><option>Sudah Baptis Anak</option><option>Sudah Baptis Dewasa</option></select></div>
                <div class="mb-3"><label class="form-label">Status Pernikahan</label><select id="pernikahan" class="form-select"><option>Belum Menikah</option><option>Menikah</option><option>Janda/Duda</option></select></div>
                <div class="mb-3"><label class="form-label">Komisi / Kelompok Sel</label><select id="komisi" class="form-select"><option>Umum</option><option>Pemuda</option><option>Remaja</option><option>Sekolah Minggu</option><option>Lansia</option><option>Belum menentukan</option></select></div>
                <div class="mb-3"><label class="form-label">Keahlian / Bakat (opsional)</label><input type="text" id="keahlian" class="form-control" placeholder="Musik, Mengajar, Multimedia, dll"></div>
                
                <div class="mb-3"><label class="form-label">Alasan Berjemaat *</label><select id="alasanBergabung" class="form-select" required><option value="">Pilih Alasan Berjemaat</option><option>Tertanam dan Komitmen Sebagai Jemaat</option><option>Simpatisan</option><option>Jemaat Sementara Karena Tugas</option></select></div>
                
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-secondary" onclick="prevStep(1)"><i class="fa-solid fa-arrow-left"></i> Sebelumnya</button>
                    <button type="button" class="btn-submit" onclick="nextStep(3)">Selanjutnya <i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
            
            <!-- STEP 3: KONFIRMASI -->
            <div id="step3" style="display:none;">
                <div class="alert alert-info"><i class="fa-solid fa-info-circle"></i> Harap periksa kembali data Anda sebelum mengirimkan pendaftaran.</div>
                <div id="reviewData" class="mb-3"></div>
                <div class="form-check mb-3"><input type="checkbox" id="agree" class="form-check-input" required><label class="form-check-label">Saya menyatakan bahwa data yang saya isikan adalah benar dan bersedia menjadi anggota jemaat GBI Karang Mulia</label></div>
                <div class="d-flex gap-2"><button type="button" class="btn btn-secondary" onclick="prevStep(2)"><i class="fa-solid fa-arrow-left"></i> Sebelumnya</button><button type="submit" class="btn-submit"><i class="fa-solid fa-check"></i> Kirim Pendaftaran</button></div>
            </div>
        </form>
        <div id="successMsg" class="alert alert-success mt-3 d-none"></div>
        <div id="errorMsg" class="alert alert-danger mt-3 d-none"></div>
    </div>
</div>
<footer>GBI Karang Mulia - Selamat Datang Keluarga Baru</footer>

<script>
    // ============ KONFIGURASI FIREBASE ============
    const firebaseConfig = {
        apiKey: "AIzaSyBnTg18qJ233oh-1Mgj4ewwRMUwMh8iVTo",
        authDomain: "gbi-karang-mulia-web.firebaseapp.com",
        projectId: "gbi-karang-mulia-web",
        storageBucket: "gbi-karang-mulia-web.firebasestorage.app",
        messagingSenderId: "198652175873",
        appId: "1:198652175873:web:82a8f9cb00557dcac88200"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let currentStep = 1;
    let fotoBase64Data = "";
    
    // Preview foto dan konversi ke Base64 (tanpa Firebase Storage)
    window.previewFoto = function(input) {
        const previewDiv = document.getElementById('previewContainer');
        const fotoError = document.getElementById('fotoError');
        
        if (input.files && input.files[0]) {
            const file = input.files[0];
            
            if (!file.type.match('image/jpeg') && !file.type.match('image/png')) {
                fotoError.innerHTML = "Format foto harus JPG atau PNG!";
                input.value = "";
                previewDiv.innerHTML = "";
                fotoBase64Data = "";
                return;
            }
            
            if (file.size > 2 * 1024 * 1024) {
                fotoError.innerHTML = "Ukuran foto maksimal 2MB!";
                input.value = "";
                previewDiv.innerHTML = "";
                fotoBase64Data = "";
                return;
            }
            
            fotoError.innerHTML = "";
            
            const reader = new FileReader();
            reader.onload = function(e) {
                fotoBase64Data = e.target.result;
                previewDiv.innerHTML = `<img src="${e.target.result}" class="preview-img" alt="Preview Foto">`;
            }
            reader.readAsDataURL(file);
            document.getElementById('fileInfo').innerHTML = `<i class="fa-solid fa-check-circle text-success"></i> Terpilih: ${file.name}`;
        } else {
            previewDiv.innerHTML = "";
            fotoBase64Data = "";
            document.getElementById('fileInfo').innerHTML = "Format JPG/PNG, max 2MB";
        }
    }

    // Konversi bulan ke Romawi
    function getBulanRomawi(monthNumber) {
        const romawi = { 1: "I", 2: "II", 3: "III", 4: "IV", 5: "V", 6: "VI", 7: "VII", 8: "VIII", 9: "IX", 10: "X", 11: "XI", 12: "XII" };
        return romawi[monthNumber] || "I";
    }
    
    // Generate nomor registrasi
    async function generateNomorRegistrasi() {
        const now = new Date();
        const tahun = now.getFullYear();
        const bulan = now.getMonth() + 1;
        const bulanRomawi = getBulanRomawi(bulan);
        
        const startDate = new Date(tahun, bulan - 1, 1);
        const endDate = new Date(tahun, bulan, 0);
        
        const snapshot = await db.collection('pendaftaran_jemaat')
            .where('createdAt', '>=', startDate)
            .where('createdAt', '<=', endDate)
            .get();
        
        const urutan = (snapshot.size + 1).toString().padStart(3, '0');
        const nomorRegistrasi = `GBI/KRGMLA/JEMAAT/${urutan}/${bulanRomawi}/${tahun}`;
        return { nomorRegistrasi, urutan, bulanRomawi, tahun };
    }
    
    // Kirim notifikasi WhatsApp
    function sendWhatsAppNotification(noHp, nomorRegistrasi, nama) {
        let waNumber = noHp.replace(/\D/g, '');
        if (waNumber.startsWith('0')) waNumber = '62' + waNumber.substring(1);
        if (!waNumber.startsWith('62')) waNumber = '62' + waNumber;
        
        const pesan = `*Selamat!*%0A%0AData anda telah teregistrasi sebagai anggota jemaat GBI Karang Mulia.%0A%0A*Nomor Jemaat:* ${nomorRegistrasi}%0A*Nama:* ${nama}%0A%0ATerimakasih, Tuhan Yesus Memberkati.%0A%0A_GBI Karang Mulia_`;
        window.open(`https://wa.me/${waNumber}?text=${pesan}`, '_blank');
    }

    function updateStepIndicator() {
        document.querySelectorAll('.step').forEach((step, idx) => { 
            step.classList.remove('active', 'completed'); 
            if(idx+1 === currentStep) step.classList.add('active'); 
            else if(idx+1 < currentStep) step.classList.add('completed'); 
        });
    }
    
    function nextStep(step) { 
        if(step === 2) {
            const nama = document.getElementById('namaLengkap').value.trim();
            const email = document.getElementById('email').value.trim();
            const noHp = document.getElementById('noHp').value.trim();
            
            if(!nama) { alert("Nama Lengkap harus diisi!"); return; }
            if(!email) { alert("Alamat Email harus diisi!"); return; }
            if(!email.match(/^\S+@\S+\.\S+$/)) { alert("Format email tidak valid!"); return; }
            if(!noHp) { alert("No. HP harus diisi!"); return; }
            if(!fotoBase64Data) { alert("Silakan upload foto profil terbaru!"); return; }
        }
        
        if(step === 3) {
            const alasan = document.getElementById('alasanBergabung').value;
            if(!alasan) { alert("Alasan Berjemaat harus dipilih!"); return; }
        }
        
        currentStep = step; 
        document.getElementById('step1').style.display = step===1 ? 'block' : 'none'; 
        document.getElementById('step2').style.display = step===2 ? 'block' : 'none'; 
        document.getElementById('step3').style.display = step===3 ? 'block' : 'none'; 
        if(step === 3) showReview(); 
        updateStepIndicator(); 
    }
    
    function prevStep(step) { 
        currentStep = step; 
        document.getElementById('step1').style.display = step===1 ? 'block' : 'none'; 
        document.getElementById('step2').style.display = step===2 ? 'block' : 'none'; 
        document.getElementById('step3').style.display = step===3 ? 'block' : 'none'; 
        updateStepIndicator(); 
    }
    
    function showReview() { 
        const nama = document.getElementById('namaLengkap').value;
        const email = document.getElementById('email').value;
        const tempatLahir = document.getElementById('tempatLahir').value;
        const tanggalLahir = document.getElementById('tanggalLahir').value;
        const jenisKelamin = document.getElementById('jenisKelamin').value;
        const golonganDarah = document.getElementById('golonganDarah').value;
        const noHp = document.getElementById('noHp').value;
        const alamat = document.getElementById('alamat').value;
        const pekerjaan = document.getElementById('pekerjaan').value;
        const baptis = document.getElementById('baptis').value;
        const pernikahan = document.getElementById('pernikahan').value;
        const komisi = document.getElementById('komisi').value;
        const keahlian = document.getElementById('keahlian').value;
        const alasanBergabung = document.getElementById('alasanBergabung').value;
        
        let fotoPreview = document.getElementById('previewContainer').innerHTML;
        let fotoHTML = fotoPreview ? fotoPreview : '<span class="text-muted">Belum ada foto</span>';
        
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
        
        document.getElementById('reviewData').innerHTML = `
            <table class="table table-sm table-bordered">
                <tr><th style="width:35%">Nama Lengkap</th><td>${escapeHtml(nama)}</br></td></tr>
                <tr><th>Email</th><td>${escapeHtml(email)}</br></td></tr>
                <tr><th>Tempat/Tgl Lahir</th><td>${escapeHtml(tempatLahir)}${tempatLahir ? ', ' : ''}${escapeHtml(tanggalLahir)}</br></td></tr>
                <tr><th>Jenis Kelamin</th><td>${escapeHtml(jenisKelamin)}</br></td></tr>
                <tr><th>Golongan Darah</th><td>${escapeHtml(golonganDarah) || '-'}</br></td></tr>
                <tr><th>No HP</th><td>${escapeHtml(noHp)}</br></td></tr>
                <tr><th>Alamat</th><td>${escapeHtml(alamat) || '-'}</br></td></tr>
                <tr><th>Pekerjaan</th><td>${escapeHtml(pekerjaan) || '-'}</br></td></tr>
                <tr><th>Status Baptis</th><td>${escapeHtml(baptis)}</br></td></tr>
                <tr><th>Status Pernikahan</th><td>${escapeHtml(pernikahan)}</br></td></tr>
                <tr><th>Komisi</th><td>${escapeHtml(komisi)}</br></td></tr>
                <tr><th>Keahlian</th><td>${escapeHtml(keahlian) || '-'}</br></td></tr>
                <tr><th>Alasan Berjemaat</th><td>${escapeHtml(alasanBergabung)}</br></td></tr>
                <tr><th>Foto Profil</th><td>${fotoHTML}</br></td></tr>
            </table>
        `; 
    }
    
    document.getElementById('daftarForm').addEventListener('submit', async (e) => { 
        e.preventDefault(); 
        
        if(!document.getElementById('agree').checked){ alert("Harap centang persetujuan data"); return; }
        if(!fotoBase64Data) { alert("Foto profil wajib diupload!"); return; }
        
        const submitBtn = document.querySelector('#daftarForm button[type="submit"]');
        const successDiv = document.getElementById('successMsg');
        const errorDiv = document.getElementById('errorMsg');
        
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Mengirim...';
        successDiv.classList.add('d-none');
        errorDiv.classList.add('d-none');
        
        try {
            const { nomorRegistrasi, urutan, bulanRomawi, tahun } = await generateNomorRegistrasi();
            
            const data = { 
                nomorRegistrasi: nomorRegistrasi,
                nomorUrut: parseInt(urutan),
                bulanRegistrasi: bulanRomawi,
                tahunRegistrasi: tahun,
                namaLengkap: document.getElementById('namaLengkap').value,
                email: document.getElementById('email').value,
                tempatLahir: document.getElementById('tempatLahir').value || '',
                tanggalLahir: document.getElementById('tanggalLahir').value || '',
                jenisKelamin: document.getElementById('jenisKelamin').value,
                golonganDarah: document.getElementById('golonganDarah').value || '',
                noHp: document.getElementById('noHp').value,
                alamat: document.getElementById('alamat').value || '',
                pekerjaan: document.getElementById('pekerjaan').value || '',
                statusBaptis: document.getElementById('baptis').value,
                statusPernikahan: document.getElementById('pernikahan').value,
                komisi: document.getElementById('komisi').value,
                keahlian: document.getElementById('keahlian').value || '',
                alasanBergabung: document.getElementById('alasanBergabung').value,
                fotoProfilBase64: fotoBase64Data,
                status: "Terverifikasi", 
                tanggalDaftar: new Date().toLocaleDateString('id-ID'), 
                createdAt: firebase.firestore.FieldValue.serverTimestamp() 
            }; 
            
            await db.collection('pendaftaran_jemaat').add(data); 
            
            document.getElementById('daftarForm').reset(); 
            document.getElementById('previewContainer').innerHTML = "";
            fotoBase64Data = "";
            
            successDiv.innerHTML = `
                <i class="fa-solid fa-check-circle"></i> Pendaftaran berhasil!<br>
                <strong>Nomor Registrasi Jemaat:</strong> ${nomorRegistrasi}<br><br>
                <i class="fa-solid fa-whatsapp"></i> Notifikasi WhatsApp akan dibuka di tab baru.
            `; 
            successDiv.classList.remove('d-none'); 
            
            const noHp = document.getElementById('noHp').value;
            const nama = document.getElementById('namaLengkap').value;
            sendWhatsAppNotification(noHp, nomorRegistrasi, nama);
            
            setTimeout(() => { window.location.href = '../index.html'; }, 5000);
            
        } catch (error) {
            console.error("Error:", error);
            errorDiv.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + error.message;
            errorDiv.classList.remove('d-none');
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-check"></i> Kirim Pendaftaran';
        }
    });
    
    updateStepIndicator();
</script>
</body>
</html>
